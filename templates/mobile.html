<!DOCTYPE html>
<html>

<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h1>手機月費比較</h1>

<table class="table">

<tr>
<th>供應商</th>
<th>月費</th>
<th>數據</th>
</tr>

{% for p in plans %}

<tr>

<td>{{ p.provider }}</td>
<td>${{ p.fee }}</td>
<td>{{ p.data }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
